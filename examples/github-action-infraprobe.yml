# InfraProbe Security Scan — GitHub Actions Workflow
#
# Scans your infrastructure on every push/PR and uploads findings
# as SARIF to GitHub Code Scanning.
#
# Setup:
#   1. Get an API key from RapidAPI (https://rapidapi.com)
#   2. Add these repository secrets:
#      - RAPIDAPI_KEY: your RapidAPI subscription key
#   3. Copy this file to .github/workflows/infraprobe.yml
#   4. Set SCAN_TARGET to your domain

name: InfraProbe Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

env:
  INFRAPROBE_BASE_URL: https://infraprobe.p.rapidapi.com
  SCAN_TARGET: "example.com"

jobs:
  security-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - name: Run scan (SARIF)
        run: |
          curl -s \
            -X POST "$INFRAPROBE_BASE_URL/v1/scan" \
            -H "Content-Type: application/json" \
            -H "X-RapidAPI-Key: ${{ secrets.RAPIDAPI_KEY }}" \
            -H "X-RapidAPI-Host: infraprobe.p.rapidapi.com" \
            -d "{\"target\": \"$SCAN_TARGET\", \"format\": \"sarif\"}" \
            -o infraprobe.sarif

          echo "SARIF report saved to infraprobe.sarif"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: infraprobe.sarif
          category: infraprobe

      - name: Run scan (JSON) and check severity
        run: |
          RESPONSE=$(curl -s \
            -X POST "$INFRAPROBE_BASE_URL/v1/scan" \
            -H "Content-Type: application/json" \
            -H "X-RapidAPI-Key: ${{ secrets.RAPIDAPI_KEY }}" \
            -H "X-RapidAPI-Host: infraprobe.p.rapidapi.com" \
            -d "{\"target\": \"$SCAN_TARGET\"}")

          echo "$RESPONSE" | jq .

          # Fail if any critical or high severity findings exist
          CRITICAL=$(echo "$RESPONSE" | jq '[.results[].results[].findings[] | select(.severity == "critical" or .severity == "high")] | length')
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical/high severity findings"
            exit 1
          fi
